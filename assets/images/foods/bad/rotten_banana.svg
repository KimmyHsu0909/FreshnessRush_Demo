<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Banana stem -->
  <rect x="30" y="6" width="4" height="4" fill="#5c4820"/>
  <rect x="28" y="10" width="4" height="4" fill="#6a5828"/>
  <!-- Banana body - curved, dark brown/rotten -->
  <rect x="26" y="12" width="4" height="4" fill="#6a5020"/>
  <rect x="22" y="14" width="4" height="4" fill="#7a6028"/>
  <rect x="26" y="14" width="4" height="4" fill="#8a6830"/>
  <!-- Row 2 -->
  <rect x="18" y="18" width="4" height="4" fill="#6a5020"/>
  <rect x="22" y="18" width="4" height="4" fill="#8a6830"/>
  <rect x="26" y="18" width="4" height="4" fill="#9a7838"/>
  <rect x="30" y="18" width="4" height="4" fill="#7a6028"/>
  <!-- Row 3 -->
  <rect x="14" y="22" width="4" height="4" fill="#5c4820"/>
  <rect x="18" y="22" width="4" height="4" fill="#7a6028"/>
  <rect x="22" y="22" width="4" height="4" fill="#9a7838"/>
  <rect x="26" y="22" width="4" height="4" fill="#8a6830"/>
  <rect x="30" y="22" width="4" height="4" fill="#6a5020"/>
  <!-- Row 4 -->
  <rect x="12" y="26" width="4" height="4" fill="#4a3818"/>
  <rect x="16" y="26" width="4" height="4" fill="#6a5020"/>
  <rect x="20" y="26" width="4" height="4" fill="#8a6830"/>
  <rect x="24" y="26" width="4" height="4" fill="#7a6028"/>
  <rect x="28" y="26" width="4" height="4" fill="#5c4820"/>
  <!-- Row 5 -->
  <rect x="10" y="30" width="4" height="4" fill="#4a3818"/>
  <rect x="14" y="30" width="4" height="4" fill="#5c4820"/>
  <rect x="18" y="30" width="4" height="4" fill="#7a6028"/>
  <rect x="22" y="30" width="4" height="4" fill="#6a5020"/>
  <rect x="26" y="30" width="4" height="4" fill="#4a3818"/>
  <!-- Tip -->
  <rect x="10" y="34" width="4" height="4" fill="#3a2810"/>
  <rect x="14" y="34" width="4" height="4" fill="#4a3818"/>
  <rect x="18" y="34" width="4" height="4" fill="#5c4820"/>
  <rect x="12" y="38" width="4" height="4" fill="#3a2810"/>
  <rect x="16" y="38" width="4" height="4" fill="#4a3818"/>
  <!-- Dark rot spots -->
  <rect x="20" y="20" width="2" height="2" fill="#2a1808"/>
  <rect x="26" y="16" width="2" height="2" fill="#2a1808"/>
  <rect x="16" y="28" width="2" height="2" fill="#2a1808"/>
  <rect x="22" y="24" width="2" height="2" fill="#2a1808"/>
  <rect x="14" y="32" width="2" height="2" fill="#2a1808"/>
  <rect x="24" y="20" width="2" height="2" fill="#2a1808"/>
  <!-- Stink lines -->
  <rect x="32" y="10" width="2" height="4" fill="#8a9060" opacity="0.5"/>
  <rect x="36" y="14" width="2" height="4" fill="#8a9060" opacity="0.5"/>
</svg>
