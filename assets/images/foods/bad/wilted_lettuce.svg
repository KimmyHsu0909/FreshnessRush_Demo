<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Wilted stem -->
  <rect x="22" y="6" width="4" height="4" fill="#5c6040"/>
  <rect x="20" y="8" width="4" height="4" fill="#4a5030"/>
  <!-- Wilted leaves - droopy, desaturated -->
  <rect x="14" y="10" width="4" height="4" fill="#6a7050"/>
  <rect x="18" y="10" width="4" height="4" fill="#7a8058"/>
  <rect x="22" y="10" width="4" height="4" fill="#7a8058"/>
  <rect x="26" y="10" width="4" height="4" fill="#6a7050"/>
  <rect x="10" y="14" width="4" height="4" fill="#5c6040"/>
  <rect x="14" y="14" width="4" height="4" fill="#7a8058"/>
  <rect x="18" y="14" width="4" height="4" fill="#8a9060"/>
  <rect x="22" y="14" width="4" height="4" fill="#8a9060"/>
  <rect x="26" y="14" width="4" height="4" fill="#7a8058"/>
  <rect x="30" y="14" width="4" height="4" fill="#5c6040"/>
  <!-- Drooping leaves -->
  <rect x="8" y="18" width="4" height="4" fill="#5c6040"/>
  <rect x="12" y="18" width="4" height="4" fill="#6a7050"/>
  <rect x="16" y="18" width="4" height="4" fill="#7a8058"/>
  <rect x="20" y="18" width="4" height="4" fill="#8a9060"/>
  <rect x="24" y="18" width="4" height="4" fill="#7a8058"/>
  <rect x="28" y="18" width="4" height="4" fill="#6a7050"/>
  <rect x="32" y="18" width="4" height="4" fill="#5c6040"/>
  <rect x="36" y="18" width="4" height="4" fill="#4a5030"/>
  <!-- Middle drooping -->
  <rect x="6" y="22" width="4" height="4" fill="#4a5030"/>
  <rect x="10" y="22" width="4" height="4" fill="#5c6040"/>
  <rect x="14" y="22" width="4" height="4" fill="#6a7050"/>
  <rect x="18" y="22" width="4" height="4" fill="#7a8058"/>
  <rect x="22" y="22" width="4" height="4" fill="#6a7050"/>
  <rect x="26" y="22" width="4" height="4" fill="#6a7050"/>
  <rect x="30" y="22" width="4" height="4" fill="#5c6040"/>
  <rect x="34" y="22" width="4" height="4" fill="#4a5030"/>
  <!-- Lower drooping leaves -->
  <rect x="8" y="26" width="4" height="4" fill="#4a5030"/>
  <rect x="12" y="26" width="4" height="4" fill="#5c6040"/>
  <rect x="16" y="26" width="4" height="4" fill="#6a7050"/>
  <rect x="20" y="26" width="4" height="4" fill="#5c6040"/>
  <rect x="24" y="26" width="4" height="4" fill="#5c6040"/>
  <rect x="28" y="26" width="4" height="4" fill="#4a5030"/>
  <rect x="32" y="26" width="4" height="4" fill="#4a5030"/>
  <!-- Bottom tips drooping down -->
  <rect x="6" y="30" width="4" height="4" fill="#3e4428"/>
  <rect x="10" y="30" width="4" height="4" fill="#4a5030"/>
  <rect x="14" y="30" width="4" height="4" fill="#5c6040"/>
  <rect x="26" y="30" width="4" height="4" fill="#4a5030"/>
  <rect x="30" y="30" width="4" height="4" fill="#3e4428"/>
  <rect x="34" y="30" width="4" height="4" fill="#3e4428"/>
  <rect x="8" y="34" width="4" height="4" fill="#3e4428"/>
  <rect x="12" y="34" width="4" height="4" fill="#4a5030"/>
  <rect x="32" y="34" width="4" height="4" fill="#3e4428"/>
  <!-- Brown spots (decay) -->
  <rect x="16" y="16" width="2" height="2" fill="#4a3820"/>
  <rect x="26" y="20" width="2" height="2" fill="#4a3820"/>
  <rect x="12" y="24" width="2" height="2" fill="#4a3820"/>
  <rect x="20" y="28" width="2" height="2" fill="#4a3820"/>
</svg>
