<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" shape-rendering="crispEdges">
  <!-- Milk carton body -->
  <rect x="14" y="8" width="4" height="4" fill="#d8dce0"/>
  <rect x="18" y="8" width="4" height="4" fill="#e8ecf0"/>
  <rect x="22" y="8" width="4" height="4" fill="#e8ecf0"/>
  <rect x="26" y="8" width="4" height="4" fill="#d8dce0"/>
  <rect x="30" y="8" width="4" height="4" fill="#c8ccd0"/>
  <!-- Carton top fold -->
  <rect x="18" y="4" width="4" height="4" fill="#c8ccd0"/>
  <rect x="22" y="4" width="4" height="4" fill="#d8dce0"/>
  <!-- Main body -->
  <rect x="12" y="12" width="4" height="4" fill="#c8ccd0"/>
  <rect x="16" y="12" width="4" height="4" fill="#e8ecf0"/>
  <rect x="20" y="12" width="4" height="4" fill="#f0f4f8"/>
  <rect x="24" y="12" width="4" height="4" fill="#e8ecf0"/>
  <rect x="28" y="12" width="4" height="4" fill="#d8dce0"/>
  <rect x="32" y="12" width="4" height="4" fill="#c8ccd0"/>
  <!-- Body rows -->
  <rect x="12" y="16" width="4" height="4" fill="#c0c4c8"/>
  <rect x="16" y="16" width="4" height="4" fill="#d8dce0"/>
  <rect x="20" y="16" width="4" height="4" fill="#e8ecf0"/>
  <rect x="24" y="16" width="4" height="4" fill="#d8dce0"/>
  <rect x="28" y="16" width="4" height="4" fill="#c8ccd0"/>
  <rect x="32" y="16" width="4" height="4" fill="#b8bcc0"/>
  <rect x="12" y="20" width="4" height="4" fill="#b8bcc0"/>
  <rect x="16" y="20" width="4" height="4" fill="#d0d4d8"/>
  <rect x="20" y="20" width="4" height="4" fill="#e0e4e8"/>
  <rect x="24" y="20" width="4" height="4" fill="#d0d4d8"/>
  <rect x="28" y="20" width="4" height="4" fill="#c0c4c8"/>
  <rect x="32" y="20" width="4" height="4" fill="#b0b4b8"/>
  <!-- Red expiry warning band -->
  <rect x="12" y="24" width="4" height="4" fill="#c82020"/>
  <rect x="16" y="24" width="4" height="4" fill="#e03030"/>
  <rect x="20" y="24" width="4" height="4" fill="#e83838"/>
  <rect x="24" y="24" width="4" height="4" fill="#e03030"/>
  <rect x="28" y="24" width="4" height="4" fill="#c82020"/>
  <rect x="32" y="24" width="4" height="4" fill="#b01818"/>
  <!-- X mark on band -->
  <rect x="18" y="24" width="2" height="2" fill="#ffffff"/>
  <rect x="22" y="24" width="2" height="2" fill="#ffffff"/>
  <rect x="20" y="26" width="2" height="2" fill="#ffffff"/>
  <!-- Lower body -->
  <rect x="12" y="28" width="4" height="4" fill="#b0b4b8"/>
  <rect x="16" y="28" width="4" height="4" fill="#c8ccd0"/>
  <rect x="20" y="28" width="4" height="4" fill="#d8dce0"/>
  <rect x="24" y="28" width="4" height="4" fill="#c8ccd0"/>
  <rect x="28" y="28" width="4" height="4" fill="#b8bcc0"/>
  <rect x="32" y="28" width="4" height="4" fill="#a8acb0"/>
  <rect x="12" y="32" width="4" height="4" fill="#a8acb0"/>
  <rect x="16" y="32" width="4" height="4" fill="#c0c4c8"/>
  <rect x="20" y="32" width="4" height="4" fill="#d0d4d8"/>
  <rect x="24" y="32" width="4" height="4" fill="#c0c4c8"/>
  <rect x="28" y="32" width="4" height="4" fill="#b0b4b8"/>
  <rect x="32" y="32" width="4" height="4" fill="#a0a4a8"/>
  <!-- Bottom -->
  <rect x="14" y="36" width="4" height="4" fill="#a0a4a8"/>
  <rect x="18" y="36" width="4" height="4" fill="#b8bcc0"/>
  <rect x="22" y="36" width="4" height="4" fill="#b8bcc0"/>
  <rect x="26" y="36" width="4" height="4" fill="#a8acb0"/>
  <rect x="30" y="36" width="4" height="4" fill="#989ca0"/>
  <!-- Stink lines -->
  <rect x="8" y="6" width="2" height="4" fill="#8a9060" opacity="0.6"/>
  <rect x="34" y="4" width="2" height="4" fill="#8a9060" opacity="0.6"/>
  <rect x="38" y="8" width="2" height="4" fill="#8a9060" opacity="0.6"/>
</svg>
